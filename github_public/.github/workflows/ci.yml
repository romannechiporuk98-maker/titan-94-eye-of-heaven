name: CI — TITAN-94

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (libs)
        run: pnpm run typecheck:libs

      - name: TypeScript check (all)
        run: pnpm run typecheck

  build-api:
    name: Build API Server
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-server-dist
          path: artifacts/api-server/dist/
          retention-days: 7

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        run: pnpm --filter @workspace/enact-dashboard run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: artifacts/enact-dashboard/dist/
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [typecheck, build-api, build-dashboard]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "TypeCheck failed"
            exit 1
          fi
          if [ "${{ needs.build-api.result }}" != "success" ]; then
            echo "API build failed"
            exit 1
          fi
          if [ "${{ needs.build-dashboard.result }}" != "success" ]; then
            echo "Dashboard build failed"
            exit 1
          fi
          echo "All checks passed ✅"
